# Serves the built SPA and reverse-proxies API calls to the backend container.
# Because the browser hits /api on the same origin, no CORS round-trip is needed.
server {
    listen 8080;
    server_name _;

    # Proxy API traffic to the Spring Boot backend (keeps its /api context-path).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward the JWT bearer token through to the API.
        proxy_set_header Authorization $http_authorization;
    }

    # SPA: serve static assets, falling back to index.html for client routes.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
